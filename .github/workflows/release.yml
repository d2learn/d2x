name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.1)'
        required: true
        type: string

env:
  XLINGS_VERSION: v0.4.51

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git build-essential

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.sh | bash -s "${XLINGS_VERSION}"
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Refresh package index
        run: xlings update

      - name: Install workspace tools (.xlings.json -> mcpp)
        run: xlings install -y

      - name: Build with mcpp (static)
        run: mcpp build --static

      - name: Locate & verify binary
        run: |
          BIN=$(find target -name d2x -type f | head -1)
          test -n "$BIN" || { echo "d2x binary not found"; find target -type f | head; exit 1; }
          chmod +x "$BIN"
          ver=$("$BIN" --version)
          echo "built d2x version: $ver (release input: ${{ inputs.version }})"
          test "$ver" = "${{ inputs.version }}" || { echo "ERROR: binary version ($ver) != release version (${{ inputs.version }})"; exit 1; }
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: Create release package
        run: |
          mkdir -p d2x-${{ inputs.version }}-linux-x86_64
          cp "$BIN" d2x-${{ inputs.version }}-linux-x86_64/
          tar -czf d2x-${{ inputs.version }}-linux-x86_64.tar.gz d2x-${{ inputs.version }}-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2x-linux-x86_64
          path: d2x-${{ inputs.version }}-linux-x86_64.tar.gz

  build-macos:
    # Built on the oldest supported macOS so the artifact also runs on newer
    # releases. mcpp manages its own toolchain, so no SDK pinning is needed.
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.sh | bash -s "${XLINGS_VERSION}"
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Refresh package index
        run: xlings update

      - name: Install workspace tools (.xlings.json -> mcpp)
        run: xlings install -y

      - name: Build with mcpp
        run: mcpp build

      - name: Locate & verify binary
        run: |
          BIN=$(find target -name d2x -type f | head -1)
          test -n "$BIN" || { echo "d2x binary not found"; find target -type f | head; exit 1; }
          chmod +x "$BIN"
          ver=$("$BIN" --version)
          echo "built d2x version: $ver (release input: ${{ inputs.version }})"
          test "$ver" = "${{ inputs.version }}" || { echo "ERROR: binary version ($ver) != release version (${{ inputs.version }})"; exit 1; }
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: Create release package
        run: |
          mkdir -p d2x-${{ inputs.version }}-macosx-arm64
          cp "$BIN" d2x-${{ inputs.version }}-macosx-arm64/
          tar -czf d2x-${{ inputs.version }}-macosx-arm64.tar.gz d2x-${{ inputs.version }}-macosx-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2x-macosx-arm64
          path: d2x-${{ inputs.version }}-macosx-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    env:
      XLINGS_NON_INTERACTIVE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xlings
        shell: pwsh
        run: |
          irm https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.ps1 | iex
          "$env:USERPROFILE\.xlings\subos\current\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Build & package with mcpp
        shell: bash
        run: |
          set -e
          xlings update
          xlings install -y
          mcpp build
          D2X=$(find target -name 'd2x.exe' -type f | head -1)
          test -n "$D2X" || { echo "d2x.exe not found"; find target -type f | head; exit 1; }
          ver=$("$D2X" --version)
          echo "built d2x version: $ver (release input: ${{ inputs.version }})"
          test "$ver" = "${{ inputs.version }}" || { echo "ERROR: binary version ($ver) != release version (${{ inputs.version }})"; exit 1; }
          mkdir -p "d2x-${{ inputs.version }}-windows-x86_64"
          cp "$D2X" "d2x-${{ inputs.version }}-windows-x86_64/"

      - name: Zip release package
        shell: pwsh
        run: |
          Compress-Archive -Path "d2x-${{ inputs.version }}-windows-x86_64" -DestinationPath "d2x-${{ inputs.version }}-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2x-windows-x86_64
          path: d2x-${{ inputs.version }}-windows-x86_64.zip

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/d2x-linux-x86_64/d2x-${{ inputs.version }}-linux-x86_64.tar.gz
            artifacts/d2x-macosx-arm64/d2x-${{ inputs.version }}-macosx-arm64.tar.gz
            artifacts/d2x-windows-x86_64/d2x-${{ inputs.version }}-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
