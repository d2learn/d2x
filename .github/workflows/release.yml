name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.1)'
        required: true
        type: string

env:
  XMAKE_VERSION: v3.0.7

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git build-essential

      - name: Install xmake (bundled ${{ env.XMAKE_VERSION }})
        run: |
          XMAKE_URL="https://github.com/xmake-io/xmake/releases/download/${{ env.XMAKE_VERSION }}/xmake-bundle-${{ env.XMAKE_VERSION }}.linux.x86_64"
          curl -fsSL -o xmake.bin "$XMAKE_URL" -H "Accept: application/octet-stream"
          chmod +x xmake.bin
          mkdir -p xmake/bin
          mv xmake.bin xmake/bin/xmake
          echo "PATH=$GITHUB_WORKSPACE/xmake/bin:$PATH" >> "$GITHUB_ENV"
          export PATH="$GITHUB_WORKSPACE/xmake/bin:$PATH"
          xmake --version

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings" >> "$GITHUB_ENV"
          echo "PATH=$HOME/.xlings/subos/current/bin:$PATH" >> "$GITHUB_ENV"

      - name: Install musl-gcc 15.1
        run: |
          MUSL_SDK=$HOME/.xlings/data/xpkgs/musl-gcc/15.1.0
          mkdir -p "$MUSL_SDK"
          curl -fSL# https://github.com/xlings-res/musl-gcc/releases/download/15.1.0/musl-gcc-15.1.0-linux-x86_64.tar.gz | tar xz -C "$MUSL_SDK" --strip-components=1
          echo "MUSL_SDK=$MUSL_SDK" >> "$GITHUB_ENV"
          echo "CC=x86_64-linux-musl-gcc" >> "$GITHUB_ENV"
          echo "CXX=x86_64-linux-musl-g++" >> "$GITHUB_ENV"
          echo "PATH=$MUSL_SDK/bin:$PATH" >> "$GITHUB_ENV"
          export PATH="$MUSL_SDK/bin:$PATH"
          test -f "$MUSL_SDK/x86_64-linux-musl/include/c++/15.1.0/bits/std.cc"
          x86_64-linux-musl-g++ --version

      - name: Setup musl runtime
        run: |
          LIBC_SO="$MUSL_SDK/x86_64-linux-musl/lib/libc.so"
          LOADER_DIR="/home/xlings/.xlings_data/lib"
          sudo mkdir -p "$LOADER_DIR"
          sudo ln -sfn "$LIBC_SO" "$LOADER_DIR/ld-musl-x86_64.so.1"
          sudo ln -sfn "$LIBC_SO" /lib/ld-musl-x86_64.so.1
          echo "$MUSL_SDK/x86_64-linux-musl/lib" | sudo tee /etc/ld-musl-x86_64.path > /dev/null
          sudo ln -sfn "$MUSL_SDK/x86_64-linux-musl/lib/libstdc++.so.6" /lib/libstdc++.so.6
          sudo ln -sfn "$MUSL_SDK/x86_64-linux-musl/lib/libgcc_s.so.1" /lib/libgcc_s.so.1

      - name: Configure xmake
        run: |
          xmake f -c -p linux -m release --sdk="$MUSL_SDK" --cross=x86_64-linux-musl- --cc="$CC" --cxx="$CXX" -y

      - name: Build with xmake
        run: xmake -j$(nproc)

      - name: Create release package
        run: |
          mkdir -p d2x-${{ inputs.version }}-linux-x86_64
          cp build/linux/x86_64/release/d2x d2x-${{ inputs.version }}-linux-x86_64/
          tar -czf d2x-${{ inputs.version }}-linux-x86_64.tar.gz d2x-${{ inputs.version }}-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2x-linux-x86_64
          path: d2x-${{ inputs.version }}-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps
        run: brew install xmake llvm@20

      - name: Build with xmake (LLVM 20 toolchain)
        run: |
          export PATH=/opt/homebrew/opt/llvm@20/bin:$PATH
          xmake f -p macosx -m release --toolchain=llvm --sdk=/opt/homebrew/opt/llvm@20 -y
          xmake -j$(sysctl -n hw.ncpu)

      - name: Verify no LLVM runtime dependency
        run: |
          BIN=build/macosx/arm64/release/d2x
          if otool -L "$BIN" | grep -q "llvm"; then
            otool -L "$BIN"
            echo "FAIL: binary links against LLVM dylib"
            exit 1
          fi
          echo "OK: binary has no LLVM runtime dependency"

      - name: Create release package
        run: |
          mkdir -p d2x-${{ inputs.version }}-macosx-arm64
          cp build/macosx/arm64/release/d2x d2x-${{ inputs.version }}-macosx-arm64/
          tar -czf d2x-${{ inputs.version }}-macosx-arm64.tar.gz d2x-${{ inputs.version }}-macosx-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2x-macosx-arm64
          path: d2x-${{ inputs.version }}-macosx-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Build with xmake
        run: |
          xmake f -m release -y
          xmake -j$env:NUMBER_OF_PROCESSORS

      - name: Create release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "d2x-${{ inputs.version }}-windows-x86_64" -Force
          Copy-Item "build\windows\x64\release\d2x.exe" -Destination "d2x-${{ inputs.version }}-windows-x86_64\"
          Compress-Archive -Path "d2x-${{ inputs.version }}-windows-x86_64" -DestinationPath "d2x-${{ inputs.version }}-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2x-windows-x86_64
          path: d2x-${{ inputs.version }}-windows-x86_64.zip

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/d2x-linux-x86_64/d2x-${{ inputs.version }}-linux-x86_64.tar.gz
            artifacts/d2x-macosx-arm64/d2x-${{ inputs.version }}-macosx-arm64.tar.gz
            artifacts/d2x-windows-x86_64/d2x-${{ inputs.version }}-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
