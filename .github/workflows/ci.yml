name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  XLINGS_VERSION: 0.4.51
  MCPP_VERSION: 0.0.52

jobs:
  build-linux-mcpp:
    name: build (linux x86_64, mcpp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xlings
        run: |
          tarball="xlings-${XLINGS_VERSION}-linux-x86_64.tar.gz"
          curl -fsSL -o "/tmp/${tarball}" \
            "https://github.com/d2learn/xlings/releases/download/v${XLINGS_VERSION}/${tarball}"
          tar -xzf "/tmp/${tarball}" -C /tmp
          "/tmp/xlings-${XLINGS_VERSION}-linux-x86_64/subos/default/bin/xlings" self install
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Refresh package index
        run: xlings update

      - name: Install workspace tools (.xlings.json -> mcpp ${{ env.MCPP_VERSION }})
        run: xlings install -y

      - name: Cache mcpp sandbox
        uses: actions/cache@v4
        with:
          path: ~/.xlings/data/xpkgs/xim-x-mcpp/${{ env.MCPP_VERSION }}/registry
          key: mcpp-sandbox-${{ runner.os }}-mcpp${{ env.MCPP_VERSION }}

      - name: Build with mcpp
        run: mcpp build

      - name: Verify d2x
        run: |
          binary=$(find target -name d2x -type f | head -1)
          test -n "$binary" || { echo "d2x binary not found"; find target -type f | head -20; exit 1; }
          chmod +x "$binary"
          "$binary" --version

  build-macos:
    name: build (${{ matrix.os }}, xmake/llvm)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Provide an OS-appropriate xmake binary. The xlings-bundled xmake is
      # built against a fixed macOS SDK and crashes on older runners
      # (issue #19: "built for macOS 15.5 which is newer than running OS"),
      # so we install xmake via the official action and use xlings only for
      # the LLVM toolchain.
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          TARBALL="xlings-${XLINGS_VERSION}-macosx-arm64.tar.gz"
          curl -fSL -o "$RUNNER_TEMP/$TARBALL" "https://github.com/d2learn/xlings/releases/download/v${XLINGS_VERSION}/${TARBALL}"
          tar -xzf "$RUNNER_TEMP/$TARBALL" -C "$RUNNER_TEMP"
          EXTRACT_DIR=$(find "$RUNNER_TEMP" -maxdepth 1 -type d -name "xlings-*" | head -1)
          xattr -dr com.apple.quarantine "$EXTRACT_DIR" 2>/dev/null || true
          chmod +x "$EXTRACT_DIR/bin/xlings"
          "$EXTRACT_DIR/bin/xlings" self install
          # Append (not prepend) so the action-provided xmake keeps priority
          # over the xlings-bundled one.
          echo "PATH=$PATH:$HOME/.xlings/subos/current/bin" >> "$GITHUB_ENV"

      - name: Install LLVM toolchain via Xlings
        run: |
          xlings install llvm -y
          which xmake && xmake --version

      - name: Configure xmake
        run: |
          LLVM_ROOT="$HOME/.xlings/data/xpkgs/xim-x-llvm"
          LLVM_SDK=$(find "$LLVM_ROOT" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)
          test -d "$LLVM_SDK"
          "$LLVM_SDK/bin/clang++" --version
          xmake f -m release --toolchain=llvm --sdk="$LLVM_SDK" -y -vvD

      - name: Build with xmake
        run: xmake -a -j"$(sysctl -n hw.logicalcpu)"

      - name: Verify d2x
        run: |
          ./build/macosx/arm64/release/d2x --version

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Build with xmake
        run: |
          xmake f -m release -y
          xmake -j$env:NUMBER_OF_PROCESSORS

      - name: Verify d2x
        run: |
          build\windows\x64\release\d2x.exe --version
