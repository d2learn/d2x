name: CI

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Xlings (quick install)
        run: |
          export XLINGS_NON_INTERACTIVE=1
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/refs/heads/main/tools/other/quick_install.sh | bash || \
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_BIN_DIR=$HOME/.xlings/subos/current/bin" >> "$GITHUB_ENV"
          echo "PATH=$HOME/.xlings/subos/current/bin:$PATH" >> "$GITHUB_ENV"

      - name: Verify Xlings and xmake
        run: |
          xlings --version
          xmake --version

      - name: Install gcc 15.1 with Xlings
        run: |
          for attempt in 1 2 3; do
            if xlings install gcc@15.1 -y; then
              echo "gcc@15.1 installed successfully"
              exit 0
            fi
            echo "Attempt ${attempt} failed. Retrying in 10s..."
            sleep 10
          done
          echo "ERROR: failed to install gcc@15.1 after 3 attempts"
          exit 1

      - name: Build with xmake
        run: |
          xmake f -m release -y
          xmake -j"$(nproc)"

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps
        run: brew install llvm@20 xmake

      - name: Install Xlings (quick install)
        run: |
          export XLINGS_NON_INTERACTIVE=1
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/refs/heads/main/tools/other/quick_install.sh | bash || \
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_BIN_DIR=$HOME/.xlings/subos/current/bin" >> "$GITHUB_ENV"
          echo "PATH=$HOME/.xlings/subos/current/bin:$PATH" >> "$GITHUB_ENV"

      - name: Verify Xlings and xmake
        run: |
          xlings --version
          xmake --version

      - name: Build with xmake (LLVM 20 toolchain)
        run: |
          export LLVM_PREFIX="/opt/homebrew/opt/llvm@20"
          PATH="/opt/homebrew/opt/llvm@20/bin:$PATH" xmake f -p macosx -m release --toolchain=llvm --sdk=/opt/homebrew/opt/llvm@20 -y
          PATH="/opt/homebrew/opt/llvm@20/bin:$PATH" xmake -j"$(sysctl -n hw.ncpu)"

      - name: Verify packaged binary with relative rpath
        run: |
          PKG_DIR="${RUNNER_TEMP}/d2x-macos-ci"
          BIN_SRC="build/macosx/arm64/release/d2x"
          BIN_DST="${PKG_DIR}/d2x"
          LIBS_DIR="${PKG_DIR}/libs"
          LLVM_PREFIX="${LLVM_PREFIX:-/opt/homebrew/opt/llvm@20}"
          LLVM_LIBCXX_DIR="${LLVM_PREFIX}/lib/c++"

          mkdir -p "${LIBS_DIR}"
          cp "${BIN_SRC}" "${BIN_DST}"

          copied=0
          while IFS= read -r dep; do
            case "$dep" in
              "${LLVM_LIBCXX_DIR}"/libc++*.dylib|"${LLVM_LIBCXX_DIR}"/libunwind*.dylib)
                dylib_name="$(basename "$dep")"
                cp -L "$dep" "${LIBS_DIR}/${dylib_name}"
                install_name_tool -change "$dep" "@rpath/${dylib_name}" "${BIN_DST}"
                copied=1
                ;;
              @rpath/libc++*.dylib|@rpath/libunwind*.dylib)
                dylib_name="$(basename "$dep")"
                dylib_src="${LLVM_LIBCXX_DIR}/${dylib_name}"
                if [ -f "${dylib_src}" ]; then
                  cp -L "${dylib_src}" "${LIBS_DIR}/${dylib_name}"
                  copied=1
                fi
                ;;
            esac
          done < <(otool -L "${BIN_DST}" | awk 'NR>1 {print $1}')

          if [ "$copied" -ne 1 ]; then
            echo "ERROR: no LLVM libc++ runtime dylibs were collected into ${LIBS_DIR}"
            exit 1
          fi

          if otool -l "${BIN_DST}" | grep -A2 "LC_RPATH" | grep -q "${LLVM_LIBCXX_DIR}"; then
            install_name_tool -delete_rpath "${LLVM_LIBCXX_DIR}" "${BIN_DST}" || {
              echo "ERROR: failed to remove absolute rpath ${LLVM_LIBCXX_DIR}"
              exit 1
            }
          fi

          if ! otool -l "${BIN_DST}" | grep -A2 "LC_RPATH" | grep -q "@loader_path/libs"; then
            if ! install_name_tool -add_rpath "@loader_path/libs" "${BIN_DST}"; then
              echo "ERROR: relative rpath is not supported or failed to apply. Please check install_name_tool compatibility."
              exit 1
            fi
          fi

          if ! otool -l "${BIN_DST}" | grep -A2 "LC_RPATH" | grep -q "@loader_path/libs"; then
            echo "ERROR: @loader_path/libs rpath was not found after patch"
            exit 1
          fi

          if [ -z "$(ls -A "${LIBS_DIR}")" ]; then
            echo "ERROR: libs directory is empty after collection"
            exit 1
          fi

          echo "Runtime link info:"
          otool -L "${BIN_DST}"
          ls -la "${LIBS_DIR}"

          (
            cd "${PKG_DIR}"
            DYLD_LIBRARY_PATH="" ./d2x --version
          )
