name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git build-essential

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://d2learn.org/xlings-install.sh | bash
          echo "PATH=$HOME/.xlings/subos/current/bin:$PATH" >> "$GITHUB_ENV"

      - name: Install xmake and gcc via Xlings
        run: xlings install xmake@3.0.7 gcc@15 -y

      - name: Build with xmake
        run: |
          xmake f -m release -vv -y
          xmake -j$(nproc)

      - name: Verify d2x --version
        run: ./build/linux/x86_64/release/d2x --version
